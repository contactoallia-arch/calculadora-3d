<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ArteLab UY — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f5f4f1;--sf:#fff;--sf2:#f5f4f1;--bd:rgba(0,0,0,0.08);--bds:rgba(0,0,0,0.14);
    --t1:#18160f;--t2:#6b6760;--t3:#aeaaa3;
    --ac:#d4601a;--ach:#bf5516;--acs:rgba(212,96,26,0.09);--acg:rgba(212,96,26,0.18);
    --ok:#1a7a40;--r:18px;--rm:12px;--rs:9px;
    --fh:'Space Grotesk',system-ui,sans-serif;
    --fb:'DM Sans',system-ui,sans-serif;
    --sh:0 1px 3px rgba(0,0,0,0.04),0 4px 20px rgba(0,0,0,0.06),0 0 0 1px rgba(0,0,0,0.05);
  }
  [data-theme="dark"]{
    --bg:#0f0e0c;--sf:#1a1915;--sf2:#211f1b;--bd:rgba(255,255,255,0.06);--bds:rgba(255,255,255,0.1);
    --t1:#f0ede8;--t2:#a09c96;--t3:#6a6660;
  }
  body{font-family:var(--fb);background:var(--bg);color:var(--t1);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .login-card{
    background:var(--sf);border-radius:var(--r);box-shadow:var(--sh);
    width:100%;max-width:420px;padding:48px 40px;
  }
  .brand{text-align:center;margin-bottom:36px}
  .brand-logo{width:56px;height:56px;background:var(--ac);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px}
  .brand-logo svg{width:32px;height:32px;fill:#fff}
  .brand-name{font-family:var(--fh);font-size:22px;font-weight:600;color:var(--t1)}
  .brand-sub{font-size:13px;color:var(--t2);margin-top:4px}
  .fl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);display:block;margin-bottom:6px}
  .fg{margin-bottom:20px}
  input[type="email"],input[type="password"],input[type="text"]{
    width:100%;height:44px;border:1px solid var(--bd);border-radius:var(--rm);
    background:var(--sf2);color:var(--t1);font-family:var(--fb);font-size:15px;
    padding:0 14px;outline:none;transition:.15s;
  }
  input:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acs)}
  .btn-login{
    width:100%;height:48px;background:var(--ac);color:#fff;border:none;border-radius:var(--rm);
    font-family:var(--fh);font-size:16px;font-weight:600;cursor:pointer;transition:.15s;
    display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;
  }
  .btn-login:hover{background:var(--ach)}
  .btn-login:disabled{opacity:.6;cursor:not-allowed}
  .err{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:var(--rs);padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}
  .err.show{display:block}
  .footer-note{text-align:center;font-size:12px;color:var(--t3);margin-top:24px}
  .theme-tog{position:fixed;top:16px;right:16px;width:38px;height:38px;border:1px solid var(--bd);border-radius:50%;background:var(--sf);color:var(--t2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<button class="theme-tog" onclick="toggleTheme()" id="themeTog">🌙</button>

<div class="login-card">
  <div class="brand">
    <div class="brand-logo">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div class="brand-name">ArteLab UY</div>
    <div class="brand-sub">Sistema de gestión</div>
  </div>

  <div class="err" id="errMsg"></div>

  <form onsubmit="doLogin(event)">
    <div class="fg">
      <label class="fl">Email</label>
      <input type="email" id="loginEmail" placeholder="admin@artelab.uy" required autocomplete="email">
    </div>
    <div class="fg">
      <label class="fl">Contraseña</label>
      <input type="password" id="loginPass" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button class="btn-login" id="loginBtn" type="submit">
      <span id="loginBtnTxt">Ingresar</span>
    </button>
  </form>

  <div class="footer-note">ArteLab UY · Gestión interna</div>
</div>

<script>
// Theme
const savedTheme = localStorage.getItem('al-theme') || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);
document.getElementById('themeTog').textContent = savedTheme === 'dark' ? '☀️' : '🌙';
function toggleTheme() {
  const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('al-theme', t);
  document.getElementById('themeTog').textContent = t === 'dark' ? '☀️' : '🌙';
}

// Si ya hay token válido, ir directo al sistema
(function() {
  const tok = localStorage.getItem('al-token');
  if (tok) {
    fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + tok } })
      .then(r => r.json())
      .then(d => { if (d.ok) window.location.href = '/'; })
      .catch(() => {});
  }
})();

async function doLogin(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errMsg');
  const txt = document.getElementById('loginBtnTxt');

  err.classList.remove('show');
  btn.disabled = true;
  txt.textContent = 'Ingresando…';

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || 'Error de login');

    localStorage.setItem('al-token', d.token);
    localStorage.setItem('al-user', JSON.stringify(d.user));
    window.location.href = '/';
  } catch (ex) {
    err.textContent = ex.message;
    err.classList.add('show');
    btn.disabled = false;
    txt.textContent = 'Ingresar';
  }
}
</script>
</body>
</html>
